<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReCharge Expense — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── LIGHT THEME ── */
:root{
  /* Sidebar dark */
  --sb:#1a2535;--sb2:#1f2d42;--sb3:#253348;--sb-text:#cbd5e1;--sb-active:#fff;--sb-border:#2d3f55;
  /* Content light */
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f8f9fb;--bg4:#f0f2f5;
  --border:#e5e8ed;--border2:#d0d5dd;
  --text:#1a2535;--text2:#64748b;--text3:#94a3b8;
  /* Accent */
  --accent:#16a34a;--accent2:#15803d;--accent-bg:#f0fdf4;--accent-border:#bbf7d0;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-border:#bfdbfe;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fde68a;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-border:#ddd6fe;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:8px;--rl:10px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 10px 30px rgba(0,0,0,.1),0 4px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;font-size:13px;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh}

/* ── LOGIN ── */
.login-screen{
  position:fixed;inset:0;z-index:500;display:flex;
  background:linear-gradient(135deg,#1a2535 0%,#1e3a5f 50%,#1a2535 100%);
  align-items:center;justify-content:center;animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.login-wrap{width:100%;max-width:400px;padding:20px}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px;}
.login-logo-mark{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(22,163,74,.4)}
.login-logo-mark svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.login-logo-name{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.4px}
.login-card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.login-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.login-fg{margin-bottom:14px}
.login-lbl{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.login-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .15s}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.pin-row{display:flex;gap:10px;justify-content:center;margin-top:4px}
.pin-box{width:52px;height:54px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;font-size:22px;font-weight:700;text-align:center;color:var(--text);font-family:var(--font);outline:none;transition:all .15s}
.pin-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(22,163,74,.1);background:#fff}
.login-err{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);border-radius:8px;padding:9px 13px;font-size:11px;margin-bottom:12px;display:none}
.login-err.show{display:block}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;margin-top:4px;box-shadow:0 2px 6px rgba(22,163,74,.3)}
.login-btn:hover{background:var(--accent2);box-shadow:0 4px 12px rgba(22,163,74,.4)}
.login-hint{text-align:center;font-size:11px;color:var(--text3);margin-top:14px;line-height:1.7}
.login-hint b{color:var(--text2)}
.quick-login{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.ql-title{font-size:11px;color:var(--text3);text-align:center;margin-bottom:10px}
.ql-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ql-btn{padding:7px 5px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;cursor:pointer;text-align:center;transition:all .15s;font-family:var(--font)}
.ql-btn:hover{background:var(--accent-bg);border-color:var(--accent-border)}
.ql-name{font-size:11px;font-weight:500;color:var(--text);display:block}
.ql-role{font-size:9px;color:var(--text3)}
.ql-dot{width:6px;height:6px;border-radius:50%;margin:0 auto 4px;display:block}

/* ── TOPNAV ── */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:0;flex-shrink:0}
.logo-mark{width:52px;height:52px;background:var(--sb);display:flex;align-items:center;justify-content:center;margin-left:-20px;flex-shrink:0}
.logo-mark svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.logo-wrap{padding-left:14px}
.logo-name{font-size:12px;font-weight:600;color:var(--text);letter-spacing:-.1px}
.logo-period{font-size:10px;color:var(--text3);font-family:var(--mono)}
.top-flow{display:flex;align-items:center;flex:1;justify-content:center;overflow:hidden;gap:0}
.tf-node{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap;flex-shrink:0;transition:all .2s}
.tf-done{background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--accent)}
.tf-active{background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue);animation:glow 2s infinite}
.tf-locked{background:var(--bg3);border:1px solid var(--border);color:var(--text3)}
.tf-arrow{color:var(--text3);font-size:10px;padding:0 2px}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,0)}50%{box-shadow:0 0 0 3px rgba(37,99,235,.12)}}
.user-info{display:flex;align-items:center;gap:8px;flex-shrink:0}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;box-shadow:0 0 0 2px #fff,0 0 0 3px var(--border)}
.topname{font-size:12px;font-weight:600;color:var(--text)}
.toprole{font-size:10px;color:var(--text3)}
.logout-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:11px;font-weight:500;color:var(--text2);font-family:var(--font);transition:all .15s}
.logout-btn:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.logout-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* PERIOD SWITCHER */
.period-switcher{position:relative;flex-shrink:0}
.period-btn{display:flex;align-items:center;gap:6px;padding:6px 11px;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;color:var(--accent);font-family:var(--font)}
.period-btn:hover{background:var(--accent);color:#fff}
.period-dropdown{position:absolute;top:calc(100% + 6px);left:0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:50;min-width:200px;box-shadow:var(--shadow-lg)}
.period-item{padding:8px 14px;font-size:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:background .1s}
.period-item:hover{background:var(--bg3)}
.period-item.active{color:var(--accent);font-weight:500}
.period-group{padding:6px 14px 3px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;background:var(--bg3);border-bottom:1px solid var(--border)}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden;position:relative}

/* ── SIDEBAR ── */
.sidebar{width:200px;background:var(--sb);flex-shrink:0;display:flex;flex-direction:column;gap:1px;overflow-y:auto;padding:12px 8px}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:#3d5270;border-radius:3px}
.sb-section{font-size:9px;font-weight:600;color:#4d6484;text-transform:uppercase;letter-spacing:.1em;padding:10px 10px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;color:var(--sb-text);font-size:12px;font-weight:400;transition:all .12s;position:relative}
.nav-item:hover{background:var(--sb2);color:#fff}
.nav-item.active{background:var(--accent);color:#fff;font-weight:500;box-shadow:0 2px 6px rgba(22,163,74,.3)}
.nav-item.locked{opacity:.3;cursor:not-allowed;pointer-events:none}
.nav-item svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.nb-amber{background:var(--amber);color:#fff}
.nb-blue{background:var(--blue);color:#fff}
.sidebar-footer{margin-top:auto;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;flex-shrink:0}
.sf-period{font-size:10px;color:#64748b;margin-bottom:2px}
.sf-total{font-size:13px;font-weight:700;color:#fff;font-family:var(--mono)}
.sf-sub{font-size:10px;color:#64748b;margin-top:1px}

/* ── CONTENT ── */
.content-wrap{flex:1;display:flex;overflow:hidden;position:relative}
.content{flex:1;overflow-y:auto;padding:24px;transition:margin-right .35s}
.content.panel-open{margin-right:420px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── SLIDE PANEL ── */
.slide-panel{position:absolute;top:0;right:0;bottom:0;width:420px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:30;box-shadow:-8px 0 32px rgba(0,0,0,.08)}
.slide-panel.open{transform:translateX(0)}
.sp-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg3)}
.sp-title{font-size:14px;font-weight:600;color:var(--text)}
.sp-close{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:13px;transition:all .15s}
.sp-close:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.sp-body{flex:1;overflow-y:auto;padding:18px}
.sp-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--bg3)}

/* ── PAGE HEADER ── */
.ph{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.ph-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px;margin-bottom:2px}
.ph-sub{font-size:12px;color:var(--text2)}
.breadcrumb{font-size:11px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.breadcrumb span{color:var(--accent);font-weight:500}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;box-shadow:var(--shadow);transition:box-shadow .15s}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-lbl{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.stat-val{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}
.stat-card.accent{border-left:3px solid var(--accent)}
.stat-card.blue{border-left:3px solid var(--blue)}
.stat-card.amber{border-left:3px solid var(--amber)}
.stat-card.red{border-left:3px solid var(--red)}

/* ── INFO BARS ── */
.info-bar{padding:10px 14px;border-radius:var(--r);font-size:12px;line-height:1.6;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.ib-blue{background:var(--blue-bg);border:1px solid var(--blue-border);color:#1e40af}
.ib-green{background:var(--green-bg);border:1px solid var(--green-border);color:#15803d}
.ib-amber{background:var(--amber-bg);border:1px solid var(--amber-border);color:#92400e}
.ib-red{background:var(--red-bg);border:1px solid var(--red-border);color:#991b1b}
.ib-purple{background:var(--purple-bg);border:1px solid var(--purple-border);color:#5b21b6}

/* ── TABLE ── */
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.tw-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;background:var(--bg3)}
.tw-title{font-size:13px;font-weight:600;color:var(--text)}
table{width:100%;border-collapse:collapse}
th{padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;background:var(--bg3);border-bottom:1px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
tbody tr{transition:background .08s}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600}
.p-green{background:var(--green-bg);color:var(--accent);border:1px solid var(--green-border)}
.p-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.p-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.p-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.p-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.p-gray{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-family:var(--font);transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg3);border-color:var(--border2)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent2);box-shadow:0 1px 3px rgba(22,163,74,.2)}
.btn-primary:hover{background:var(--accent2);box-shadow:0 2px 6px rgba(22,163,74,.3)}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.btn-danger:hover{background:#fee2e2}
.btn-approve{background:var(--green-bg);color:var(--accent);border-color:var(--green-border)}
.btn-approve:hover{background:#dcfce7}
.btn-sm{padding:4px 9px;font-size:10px}
.btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bg{display:flex;gap:6px;align-items:center}

/* ── CARDS ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.dc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;box-shadow:var(--shadow)}
.dc-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.sum-row:last-child{border-bottom:none;padding-top:10px;font-weight:600}
.amount{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text)}

/* ── FORM ── */
.fg{margin-bottom:13px}
.fl{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
.fl span{color:var(--red)}
.fi{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;font-size:12px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(22,163,74,.08)}
.fi-prefix{display:flex;align-items:center;background:var(--bg3);border:1.5px solid var(--border);border-radius:7px;overflow:hidden;transition:border-color .15s}
.fi-prefix:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(22,163,74,.08)}
.fi-pre{padding:8px 11px;font-size:11px;color:var(--text3);background:var(--bg4);border-right:1.5px solid var(--border);white-space:nowrap;font-weight:500}
.fi-prefix .fi{border:none;border-radius:0;background:transparent;box-shadow:none}
.fi-prefix .fi:focus{background:transparent;box-shadow:none}
.hint{font-size:10px;color:var(--text3);margin-top:3px}
.err-msg{font-size:10px;color:var(--red);display:none}
.err-msg.show{display:block}
.chip-group{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .12s;user-select:none}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.chip.sel{background:var(--accent);border-color:var(--accent2);color:#fff;box-shadow:0 1px 4px rgba(22,163,74,.3)}

/* ── UPLOAD ── */
.uzone{border:2px dashed var(--border2);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3);position:relative;margin-bottom:8px}
.uzone:hover,.uzone.drag{border-color:var(--accent);background:var(--accent-bg)}
.uzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uzone svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 6px;display:block}
.uzone-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:2px}
.uzone-sub{font-size:10px;color:var(--text3)}
.upload-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.ubtn{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:7px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:var(--font);position:relative;overflow:hidden;transition:all .12s}
.ubtn:hover{background:var(--bg3);color:var(--text)}
.ubtn.green{background:var(--accent);color:#fff;border-color:var(--accent2)}
.ubtn.green:hover{background:var(--accent2)}
.ubtn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.ubtn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.prev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.prev-item{position:relative;border-radius:7px;overflow:hidden;border:1px solid var(--border);background:var(--bg3);aspect-ratio:1;transition:all .15s;cursor:pointer}
.prev-item:hover{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.prev-item img{width:100%;height:100%;object-fit:cover}
.prev-pdf{width:100%;height:100%;background:var(--red-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.prev-pdf svg{width:18px;height:18px;stroke:var(--red);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.prev-pdf-name{font-size:8px;color:var(--red);text-align:center;padding:0 4px;word-break:break-all}
.prev-del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(220,38,38,.85);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;border:none}
.prev-item:hover .prev-del{opacity:1}
.prev-num{position:absolute;bottom:3px;left:3px;background:rgba(0,0,0,.5);color:#fff;font-size:8px;font-weight:600;padding:1px 5px;border-radius:10px;font-family:var(--mono)}

/* ── DOC CARDS ── */
.doc-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:11px;box-shadow:var(--shadow)}
.doc-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-icon svg{width:17px;height:17px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.doc-xl{background:#f0fdf4} .doc-xl svg{stroke:var(--accent)}
.doc-pdf{background:var(--red-bg)} .doc-pdf svg{stroke:var(--red)}
.doc-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px}
.doc-meta{font-size:10px;color:var(--text3);margin-bottom:7px}

/* ── MISC ── */
.locked-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:280px;gap:14px;text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl)}
.lock-icon{font-size:36px}
.lock-title{font-size:14px;font-weight:600;color:var(--text2)}
.lock-sub{font-size:12px;color:var(--text3);max-width:260px;line-height:1.7}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--accent);font-weight:500}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:livepulse 1.5s infinite}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.4}}
.struk-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.struk-thumb{width:32px;height:32px;border-radius:5px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:all .12s;flex-shrink:0}
.struk-thumb:hover{border-color:var(--accent);transform:scale(1.08);box-shadow:0 2px 6px rgba(0,0,0,.1)}
.struk-thumb img{width:100%;height:100%;object-fit:cover}
.struk-pdf{width:100%;height:100%;background:var(--red-bg);display:flex;align-items:center;justify-content:center}
.struk-pdf svg{width:14px;height:14px;stroke:var(--red);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.add-inline{display:flex;align-items:center;gap:8px;padding:11px 14px;border:2px dashed var(--border2);border-radius:var(--r);cursor:pointer;transition:all .15s;color:var(--text3);font-size:12px;margin-top:4px;background:var(--bg2)}
.add-inline:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.add-inline svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.divider{height:1px;background:var(--border);margin:14px 0}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(26,37,53,.4);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:#fff;border:1px solid var(--border);border-radius:14px;padding:24px;width:400px;max-width:92vw;box-shadow:var(--shadow-lg)}
.modal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.toast{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;box-shadow:var(--shadow-lg);animation:slideIn .25s ease;border:1px solid transparent}
.toast-green{background:#fff;border-color:var(--green-border);color:var(--accent)}
.toast-blue{background:#fff;border-color:var(--blue-border);color:var(--blue)}
.toast-red{background:#fff;border-color:var(--red-border);color:var(--red)}
.toast-amber{background:#fff;border-color:var(--amber-border);color:var(--amber)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:300}
.lightbox img{max-width:88vw;max-height:88vh;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lb-close{position:absolute;top:18px;right:18px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.lb-close:hover{background:rgba(255,255,255,.25)}

/* ── USER CARD ── */
.user-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 16px;display:flex;align-items:center;gap:11px;margin-bottom:7px;box-shadow:var(--shadow);transition:box-shadow .15s}
.user-card:hover{box-shadow:var(--shadow-md)}
.user-card.inactive{opacity:.5}
.ua-lg{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.toggle{width:32px;height:18px;border-radius:9px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle.off{background:var(--border2)}
.toggle::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:17px}
.toggle.off::after{left:3px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
</style>
</head>

function focusPin() { document.getElementById('p0').focus(); }

function pinInput(i) {
  const el = document.getElementById(`p${i}`);
  if(el.value && i < 3) document.getElementById(`p${i+1}`).focus();
  document.getElementById('loginErr').classList.remove('show');

function pinKey(e, i) {
  if(e.key==='Backspace' && !document.getElementById(`p${i}`).value && i > 0)
    document.getElementById(`p${i-1}`).focus();
}

function getPin() {
  return [0,1,2,3].map(i=>document.getElementById(`p${i}`).value).join('');
}

function quickLogin(email, pin) {
  document.getElementById('loginEmail').value = email;
  [0,1,2,3].forEach((i,idx)=>{ document.getElementById(`p${i}`).value=pin[idx]; });
  doLogin();
}

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pin   = getPin();
  if(!email || pin.length < 4) return;

  // Show loading on button
  const btn = document.querySelector('.login-btn');
  btn.textContent = 'Memuat...';
  btn.disabled = true;

  supa.from('users')
    .select('*')
    .eq('email', email)
    .eq('pin', pin)
    .eq('is_active', true)
    .single()
    .then(({ data, error }) => {
      btn.textContent = 'Masuk →';
      btn.disabled = false;

      if(error || !data) {
        document.getElementById('loginErr').classList.add('show');
        [0,1,2,3].forEach(i => document.getElementById(`p${i}`).value = '');
        document.getElementById('p0').focus();
        return;
      }

      app.currentUser = {
        id:       data.id,
        name:     data.name,
        short:    data.short_name,
        role:     data.role,
        salesKey: data.sales_key,
        color:    data.color,
        bank:     data.bank,
        acc:      data.account_no,
        email:    data.email,
        pin:      data.pin,
      };

      // Fade out login, show app
      document.getElementById('loginScreen').style.opacity = '0';
      document.getElementById('loginScreen').style.transition = 'opacity .3s';
      setTimeout(() => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appShell').style.display = 'flex';
      }, 300);

      updateTopbar();
      loadAndRender();
      toast(`Selamat datang, ${app.currentUser.short}! 👋`, 'green');
    });
}

// ─── LOAD DATA FROM SUPABASE & RENDER ────────────────
async function loadAndRender() {
  app.screen = 0;
  updateTopbar();
  showLoading('Memuat data dari database...');

  try {
    // 1. Load app_state (stage)
    const { data: stateData } = await supa
      .from('app_state')
      .select('*')
      .eq('id', 1)
      .single();
    if(stateData) {
      app.stage     = stateData.stage;
      app.period    = stateData.period_id;
      document.getElementById('periodBtnLabel').textContent = periods.find(p=>p.id===app.period)?.label || app.period;
      document.getElementById('periodLabel').textContent    = periods.find(p=>p.id===app.period)?.label || app.period;
    }

    // 2. Load all users
    const { data: usersData } = await supa.from('users').select('*').order('name');
    if(usersData) {
      USERS.length = 0;
      usersData.forEach(u => USERS.push({
        id: u.id, name: u.name, short: u.short_name,
        role: u.role, salesKey: u.sales_key, color: u.color,
        bank: u.bank, acc: u.account_no, email: u.email,
        pin: u.pin, active: u.is_active,
      }));
    }

    // 3. Load transactions for current period
    await loadTransactions(app.period);

    // 4. Load approvals
    await loadApprovals(app.period);

    render();
  } catch(e) {
    console.error('loadAndRender error:', e);
    toast('Gagal memuat data. Cek koneksi internet.', 'red');
    render(); // render with existing data
  }
}

async function loadTransactions(periodId) {
  const { data, error } = await supa
    .from('transactions')
    .select('*, receipts(*)')
    .eq('period_id', periodId)
    .order('transaction_date');

  if(error || !data) return;

  // Reset db items
  Object.keys(db).forEach(k => db[k].items = []);

  data.forEach(t => {
    if(!db[t.sales_key]) return;
    db[t.sales_key].items.push({
      id:      t.id,
      rawDate: t.transaction_date,
      tgl:     t.transaction_date_label || formatTgl(t.transaction_date),
      kat:     t.category,
      ket:     t.description,
      amt:     t.amount,
      files:   (t.receipts||[]).map(r => ({
        name: r.file_name, url: r.file_url, type: r.file_type || 'image/jpeg'
      })),
      adminNote: t.admin_note || '',
    });
  });
}

async function loadApprovals(periodId) {
  const { data } = await supa
    .from('approvals')
    .select('*')
    .eq('period_id', periodId);

  if(!data) return;
  Object.keys(db).forEach(k => {
    app.eviStatus[k]   = 'pending';
    app.ellenStatus[k] = 'pending';
  });
  data.forEach(a => {
    if(a.approver_role === 'evi')   app.eviStatus[a.sales_key]   = a.status;
    if(a.approver_role === 'ellen') app.ellenStatus[a.sales_key] = a.status;
  });
}

function formatTgl(dateStr) {
  if(!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('id-ID', {day:'numeric', month:'short'});
}

// ─── SAVE TRANSACTION TO SUPABASE ────────────────────
async function saveTransaction() {
  const u = app.currentUser;
  const canSubmit = u && (u.role==='sales' || u.role==='admin' || u.role==='approver1');
  if(!canSubmit) { toast('Tidak diizinkan', 'red'); return; }

  const key      = u.salesKey;
  const selChip  = document.querySelector('#pKatChips .chip.sel');
  const ketEl    = document.getElementById('pKet');
  const nomEl    = document.getElementById('pNominal');

  let ok = true;
  if(!selChip)          { document.getElementById('pKatErr').classList.add('show'); ok=false; }
  if(!ketEl?.value.trim()) { document.getElementById('pKetErr').classList.add('show'); ok=false; }
  const nom = parseInt(nomEl?.value) || 0;
  if(nom <= 0)          { document.getElementById('pNomErr').classList.add('show'); ok=false; }
  if(!ok) return;

  const rawDate = document.getElementById('pDate').value;
  const tgl     = formatTgl(rawDate);
  const kat     = selChip.textContent.split(' ').slice(1).join(' ');
  const ket     = ketEl.value.trim();

  // Show saving state
  const saveBtn = document.querySelector('.sp-footer .btn-primary');
  if(saveBtn) { saveBtn.textContent = 'Menyimpan...'; saveBtn.disabled = true; }

  try {
    let transactionId;

    if(app.editItem) {
      // UPDATE
      const { data } = await supa.from('transactions')
        .update({
          transaction_date:       rawDate,
          transaction_date_label: tgl,
          category:    kat,
          description: ket,
          amount:      nom,
          updated_at:  new Date().toISOString(),
        })
        .eq('id', app.editItem.id)
        .select()
        .single();
      transactionId = data?.id || app.editItem.id;

      // Delete old receipts if new files added
      if(app.panelFiles.some(f => f.url.startsWith('blob:'))) {
        await supa.from('receipts').delete().eq('transaction_id', transactionId);
      }
      toast('✓ Item berhasil diupdate', 'green');
    } else {
      // INSERT
      const { data, error } = await supa.from('transactions')
        .insert({
          user_id:                u.id,
          sales_key:              key,
          period_id:              app.period,
          transaction_date:       rawDate,
          transaction_date_label: tgl,
          category:    kat,
          description: ket,
          amount:      nom,
          has_receipt: app.panelFiles.length > 0,
        })
        .select()
        .single();

      if(error) throw error;
      transactionId = data.id;
      toast('✓ Transaksi berhasil disimpan', 'green');
    }

    // Upload files to Supabase Storage
    if(app.panelFiles.length > 0) {
      for(const file of app.panelFiles) {
        if(file.url.startsWith('blob:')) {
          try {
            const blob     = await fetch(file.url).then(r => r.blob());
            const ext      = file.name.split('.').pop();
            const filePath = `${key}/${transactionId}/${Date.now()}_${file.name}`;

            const { error: upErr } = await supa.storage
              .from('receipts')
              .upload(filePath, blob, { upsert: true, contentType: file.type });

            if(!upErr) {
              const { data: urlData } = supa.storage
                .from('receipts')
                .getPublicUrl(filePath);

              await supa.from('receipts').insert({
                transaction_id: transactionId,
                file_name:      file.name,
                file_path:      filePath,
                file_url:       urlData.publicUrl,
                file_type:      file.type,
                file_size:      blob.size,
              });
            }
          } catch(e) { console.warn('Upload file error:', e); }
        }
      }
      // Update has_receipt flag
      await supa.from('transactions')
        .update({ has_receipt: true })
        .eq('id', transactionId);
    }

    closePanel();
    await loadTransactions(app.period);
    renderContent();

  } catch(e) {
    console.error('Save error:', e);
    toast('Gagal menyimpan. Coba lagi.', 'red');
    if(saveBtn) { saveBtn.textContent = 'Simpan'; saveBtn.disabled = false; }
  }
}

async function doAddUser() {
  const name  = document.getElementById('nu-name')?.value;
  const short = document.getElementById('nu-short')?.value;
  const email = document.getElementById('nu-email')?.value;
  const pin   = document.getElementById('nu-pin')?.value;

    name, short_name: short, email, pin, role: 'sales',
    sales_key: short, color, bank, account_no: acc, is_active: true,
  }).select().single();

function renderAdmin(){
  const fns=[adminDash,adminReview,adminCompile,adminSendEvi,adminExport,adminArchive,adminUsers];
  document.getElementById('content').innerHTML=(fns[app.screen]||adminDash)();

function adminDash(){
  const isPast=periods.find(p=>p.id===app.period)?.done;

function doAddUser(){
  const name=document.getElementById('nu-name')?.value,short=document.getElementById('nu-short')?.value,email=document.getElementById('nu-email')?.value,pin=document.getElementById('nu-pin')?.value;
  if(!name||!short||!email||pin?.length!==4){toast('Semua field wajib diisi (PIN 4 digit)','red');return;}
  if(USERS.find(u=>u.email===email)){toast('Email sudah terdaftar','red');return;}
  const colors=['#4ade80','#60a5fa','#fb923c','#f472b6','#a78bfa','#2dd4bf','#34d399'];
  const key=short;
  USERS.push({id:short.toLowerCase(),name,short,role:'sales',color:colors[Math.floor(Math.random()*colors.length)],active:true,email,pin,bank:document.getElementById('nu-bank')?.value||'BCA',acc:document.getElementById('nu-acc')?.value||'',salesKey:key});
  if(!db[key]) db[key]={full:name,color:'#94a3b8',items:[]};
  closeModal(); toast(`✓ ${short} berhasil ditambahkan. PIN: ${pin}`,'green'); renderContent();
}

function openEditPIN(id){
  const u=USERS.find(x=>x.id===id); if(!u)return;
  showModal(`Reset PIN — ${u.short}`,`PIN baru untuk ${u.name}`,
    `<div class="fg"><label class="fl">PIN Baru (4 digit)</label><input class="fi" id="newpin" type="password" maxlength="4" placeholder="0000"></div>`,
    `<button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="doResetPIN('${id}')">Simpan PIN</button>`);
}
function doResetPIN(id){
  const pin=document.getElementById('newpin')?.value;
  if(pin?.length!==4){toast('PIN harus 4 digit','red');return;}
  const u=USERS.find(x=>x.id===id); if(u) u.pin=pin;
  closeModal(); toast(`✓ PIN ${u.short} berhasil direset`,'green');
}

    doc.setFillColor(30,37,53);

    doc.setFontSize(11);doc.setFont('helvetica','bold');

    y+=12;

    // Table header
    const cols=[margin, 80, 115, 145, 175];

    doc.rect(margin-2,y-4,W-2*margin+4,7,'F');

// ── PDF Ringkasan Per Sales ──
function exportPDFSales(salesKey){
  toast(`⏳ Membuat PDF ${salesKey}...`,'blue');
  setTimeout(()=>{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210, margin=18;
    const n=salesKey;
    const u=USERS.find(x=>x.salesKey===n);
    const tot=db[n].items.reduce((s,i)=>s+i.amt,0);
    let y=18;

    // Header
    doc.setFillColor(14,17,23);doc.rect(0,0,W,38,'F');
    doc.setTextColor(74,222,128);doc.setFontSize(16);doc.setFont('helvetica','bold');
    doc.text('BUKTI PENGAJUAN REIMBURSEMENT',margin,14);
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(139,149,168);
    doc.text(`${db[n].full} — Periode April 2026`,margin,22);
    doc.text(`Bank: ${u?.bank||'-'}  |  No. Rek: ${u?.acc||'-'}`,margin,29);
    doc.setTextColor(74,222,128);
    doc.text(`Total: Rp ${tot.toLocaleString('id-ID')}`,W-margin,22,{align:'right'});
    doc.text(`${db[n].items.length} transaksi`,W-margin,29,{align:'right'});
    y=48;

    // Status badges
    doc.setFillColor(13,46,26);doc.rect(margin-2,y-5,55,8,'F');
    doc.setTextColor(74,222,128);doc.setFontSize(8.5);doc.setFont('helvetica','bold');
    doc.text('✓ Approved Evi',margin,y);
    doc.setFillColor(13,46,26);doc.rect(margin+58,y-5,55,8,'F');
    doc.text('✓ Final Approved Ellen',margin+60,y);
    y+=12;

    // Detail header
    doc.setFillColor(37,45,61);doc.rect(margin-2,y-4,W-2*margin+4,7,'F');
    doc.setTextColor(139,149,168);doc.setFontSize(8);doc.setFont('helvetica','bold');
    const cols=[margin,35,58,80,160,180];
    ['No','Tgl','Kat','Keterangan','Nominal','Struk'].forEach((h,i)=>doc.text(h,cols[i],y));
    y+=8;

    db[n].items.forEach((item,i)=>{
      if(y>270){doc.addPage();y=20;}
      if(i%2===0){doc.setFillColor(22,27,36);doc.rect(margin-2,y-4,W-2*margin+4,7,'F');}
      doc.setTextColor(232,237,245);doc.setFontSize(8.5);doc.setFont('helvetica','normal');
      doc.text(String(i+1),cols[0],y);
      doc.text(item.tgl,cols[1],y);
      doc.text(item.kat,cols[2],y);
      const ket=item.ket.length>38?item.ket.slice(0,36)+'…':item.ket;
      doc.text(ket,cols[3],y);
      doc.setFont('helvetica','bold');
      doc.text(item.amt.toLocaleString('id-ID'),cols[4],y);
      doc.setFont('helvetica','normal');
      doc.setTextColor(item.files.length>0?'#4ade80':'#fbbf24');
      doc.text(item.files.length>0?'✓':'-',cols[5],y);
      doc.setTextColor(232,237,245);
      y+=7.5;
    });

    // Total
    y+=2;
    doc.setFillColor(13,46,26);doc.rect(margin-2,y-4,W-2*margin+4,9,'F');
    doc.setTextColor(74,222,128);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text('TOTAL',cols[3],y+1);
    doc.text(tot.toLocaleString('id-ID'),cols[4],y+1);

    doc.save(`Ringkasan_${n}_April2026.pdf`);
    toast(`✓ PDF ${n} berhasil diunduh`,'green');
  },300);
}

// ── Download semua PDF sekaligus ──
function exportAllPDF(){
  toast('⏳ Mengunduh semua PDF...','blue');
  let i=0;
  function next(){ if(i<salesNames.length){ exportPDFSales(salesNames[i]); i++; setTimeout(next,600); } else { toast('✓ Semua PDF selesai diunduh','green'); } }
  setTimeout(next, 200);
}
